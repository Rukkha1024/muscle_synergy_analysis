muscles:
  names: ["TA", "EHL", "MG", "SOL", "PL", "RF", "VL", "ST", "RA", "EO", "IO", "SCM", "GM", "ESC", "EST", "ESL"]

synergy_analysis:
  mode: "both"

feature_extractor:
  type: "nmf"
  nmf:
    backend: "auto"
    torch_device: "auto"
    torch_dtype: "float32"
    vaf_threshold: 0.90
    max_components_to_try: 8
    random_state: 42
    fit_params:
      max_iter: 1000
      tol: 0.0001
      beta: 2

      
synergy_clustering:
  algorithm: "auto"
  torch_device: "auto"
  torch_dtype: "float32"
  torch_restart_batch_size: 128
  gap_reference_batch_size: 16
  selection_method: "gap_statistic"
  require_zero_duplicate_solution: true
  duplicate_resolution: "none"
  max_clusters: 20
  repeats: 1000
  gap_ref_n: 500
  gap_ref_restarts: 100
  uniqueness_candidate_restarts: 1000
  random_state: 42
  max_iter: 300
  representative:
    h_output_interpolation:
      target_windows: 100

cross_group_w_similarity:
  enabled: true
  metric: "cosine"
  threshold: 0.8
  assignment: "linear_sum_assignment"
  output_excel_sheets: true
  output_figures: true

figures:
  format: "png"
  dpi: 150
  overview_columns: 2
