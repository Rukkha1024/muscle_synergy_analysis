feature_extractor:
  type: nmf
  nmf:
    vaf_threshold: 0.9
    max_components_to_try: 4
    fit_params:
      max_iter: 1000
      tol: 0.0001
synergy_clustering:
  algorithm: cuml_kmeans
  max_clusters: 4
  max_iter: 100
  repeats: 10
  random_state: 7
  disallow_within_trial_duplicate_assignment: true
