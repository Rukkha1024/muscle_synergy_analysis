feature_extractor:
  type: nmf
  nmf:
    backend: torchnmf
    torch_device: cpu
    torch_dtype: float32
    vaf_threshold: 0.9
    max_components_to_try: 4
    fit_params:
      max_iter: 1000
      tol: 0.0001
synergy_clustering:
  algorithm: torch_kmeans
  torch_device: cpu
  torch_dtype: float32
  torch_restart_batch_size: 8
  gap_reference_batch_size: 2
  selection_method: gap_statistic
  require_zero_duplicate_solution: true
  duplicate_resolution: none
  max_clusters: 4
  max_iter: 100
  repeats: 10
  gap_ref_n: 5
  gap_ref_restarts: 3
  uniqueness_candidate_restarts: 10
  random_state: 7
  representative:
    h_output_interpolation:
      target_windows: 100
cross_group_w_similarity:
  enabled: true
  metric: cosine
  threshold: 0.8
  assignment: linear_sum_assignment
  output_pairwise_csv: true
  output_cluster_decision_csv: true
  output_excel_sheets: true
figures:
  format: png
  dpi: 120
  overview_columns: 2
